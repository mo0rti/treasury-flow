name: TreasuryFlow
options:
  bundleIdPrefix: com.mortitech.treasuryflow
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: 1

targets:
  Treasuryflow:
    type: application
    platform: iOS
    sources:
      - path: treasuryflow
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    settings:
      base:
        INFOPLIST_FILE: treasuryflow/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.mortitech.treasuryflow
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets:
        - TreasuryflowTests
        - TreasuryflowUITests

  TreasuryflowTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: treasuryflowTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Treasuryflow

  TreasuryflowUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: treasuryflowUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Treasuryflow
    dependencies:
      - target: Treasuryflow
