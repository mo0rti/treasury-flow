version: "3"

vars:
  PROJECT_NAME: '{{ .PROJECT_NAME | default "TreasuryFlow" }}'
  SCHEME: '{{ .SCHEME | default "Treasuryflow" }}'
  SIMULATOR_NAME: '{{ .SIMULATOR_NAME | default "iPhone 16" }}'

tasks:
  generate-project:
    desc: Generate Xcode project from project.yml
    platforms: [darwin]
    cmds:
      - xcodegen generate

  build:
    desc: Build the iOS app
    platforms: [darwin]
    deps: [generate-project]
    vars:
      SIMULATOR_ID:
        sh: |
          xcrun simctl list devices available | awk '/{{ .SIMULATOR_NAME }} \(/ { line = $0 } END { if (line == "") { print "No available iOS simulator matched SIMULATOR_NAME={{ .SIMULATOR_NAME }}" > "/dev/stderr"; exit 1 } if (!match(line, /\([A-Fa-f0-9-]+\)/)) { print "Could not parse simulator identifier for SIMULATOR_NAME={{ .SIMULATOR_NAME }}" > "/dev/stderr"; exit 1 } print substr(line, RSTART + 1, RLENGTH - 2) }'
    cmds:
      - xcodebuild build -project "{{ .PROJECT_NAME }}.xcodeproj" -scheme "{{ .SCHEME }}" -destination "platform=iOS Simulator,id={{ .SIMULATOR_ID }}" -configuration Debug

  test:
    desc: Run all iOS tests
    platforms: [darwin]
    deps: [generate-project]
    vars:
      SIMULATOR_ID:
        sh: |
          xcrun simctl list devices available | awk '/{{ .SIMULATOR_NAME }} \(/ { line = $0 } END { if (line == "") { print "No available iOS simulator matched SIMULATOR_NAME={{ .SIMULATOR_NAME }}" > "/dev/stderr"; exit 1 } if (!match(line, /\([A-Fa-f0-9-]+\)/)) { print "Could not parse simulator identifier for SIMULATOR_NAME={{ .SIMULATOR_NAME }}" > "/dev/stderr"; exit 1 } print substr(line, RSTART + 1, RLENGTH - 2) }'
    cmds:
      - xcodebuild test -project "{{ .PROJECT_NAME }}.xcodeproj" -scheme "{{ .SCHEME }}" -destination "platform=iOS Simulator,id={{ .SIMULATOR_ID }}"

  test-unit:
    desc: Run iOS unit tests only
    platforms: [darwin]
    deps: [generate-project]
    vars:
      SIMULATOR_ID:
        sh: |
          xcrun simctl list devices available | awk '/{{ .SIMULATOR_NAME }} \(/ { line = $0 } END { if (line == "") { print "No available iOS simulator matched SIMULATOR_NAME={{ .SIMULATOR_NAME }}" > "/dev/stderr"; exit 1 } if (!match(line, /\([A-Fa-f0-9-]+\)/)) { print "Could not parse simulator identifier for SIMULATOR_NAME={{ .SIMULATOR_NAME }}" > "/dev/stderr"; exit 1 } print substr(line, RSTART + 1, RLENGTH - 2) }'
    cmds:
      - xcodebuild test -project "{{ .PROJECT_NAME }}.xcodeproj" -scheme "{{ .SCHEME }}" -destination "platform=iOS Simulator,id={{ .SIMULATOR_ID }}" -only-testing:"{{ .SCHEME }}Tests"

  test-ui:
    desc: Run iOS UI tests only
    platforms: [darwin]
    deps: [generate-project]
    vars:
      SIMULATOR_ID:
        sh: |
          xcrun simctl list devices available | awk '/{{ .SIMULATOR_NAME }} \(/ { line = $0 } END { if (line == "") { print "No available iOS simulator matched SIMULATOR_NAME={{ .SIMULATOR_NAME }}" > "/dev/stderr"; exit 1 } if (!match(line, /\([A-Fa-f0-9-]+\)/)) { print "Could not parse simulator identifier for SIMULATOR_NAME={{ .SIMULATOR_NAME }}" > "/dev/stderr"; exit 1 } print substr(line, RSTART + 1, RLENGTH - 2) }'
    cmds:
      - xcodebuild test -project "{{ .PROJECT_NAME }}.xcodeproj" -scheme "{{ .SCHEME }}" -destination "platform=iOS Simulator,id={{ .SIMULATOR_ID }}" -only-testing:"{{ .SCHEME }}UITests"

  clean:
    desc: Clean build artifacts
    platforms: [darwin]
    cmds:
      - rm -rf build/
      - xcodebuild clean -project "{{ .PROJECT_NAME }}.xcodeproj" -scheme "{{ .SCHEME }}" 2>/dev/null || true
