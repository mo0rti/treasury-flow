
name: User Web App CI/CD

on:
  push:
    branches: [main]
    paths:
      - "web-user-app/**"
      - "shared/**"
  pull_request:
    branches: [main]
    paths:
      - "web-user-app/**"
      - "shared/**"
  workflow_dispatch:

jobs:
  lint-typecheck-build:
    name: Lint, Typecheck, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: web-user-app
        run: npm install

      - name: Lint
        working-directory: web-user-app
        run: npm run lint

      - name: Typecheck
        working-directory: web-user-app
        run: npm run typecheck

      - name: Build
        working-directory: web-user-app
        run: npm run build

      - name: Build Cloudflare bundle
        working-directory: web-user-app
        run: npm run build:cloudflare

      - name: Smoke test Wrangler packaging
        working-directory: web-user-app
        run: npx wrangler deploy --dry-run

  deploy:
    name: Deploy to Cloudflare
    needs: lint-typecheck-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != ''
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: web-user-app
        run: npm install

      - name: Deploy worker
        working-directory: web-user-app
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
