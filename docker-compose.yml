name: treasuryflow

services:
backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DATABASE_NAME:-treasuryflow}
      SPRING_DATASOURCE_USERNAME: ${DATABASE_USERNAME:-treasuryflow}
      SPRING_DATASOURCE_PASSWORD: ${DATABASE_PASSWORD:-localdev}
JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-do-not-use-in-production}
      JWT_ACCESS_TOKEN_EXPIRY: ${JWT_ACCESS_TOKEN_EXPIRY:-3600}
      JWT_REFRESH_TOKEN_EXPIRY: ${JWT_REFRESH_TOKEN_EXPIRY:-604800}
GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
APPLE_CLIENT_ID: ${APPLE_CLIENT_ID}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID}
      APPLE_KEY_ID: ${APPLE_KEY_ID}
      APPLE_PRIVATE_KEY: ${APPLE_PRIVATE_KEY}
depends_on:
      db:
        condition: service_healthy


  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-treasuryflow}
      POSTGRES_USER: ${DATABASE_USERNAME:-treasuryflow}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-localdev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-treasuryflow}"]
      interval: 5s
      timeout: 5s
      retries: 5




volumes:

  pgdata:


