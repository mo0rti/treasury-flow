spring:
  application:
    name: treasuryflow-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/treasuryflow}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME:treasuryflow}
    password: ${DATABASE_PASSWORD:localdev}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    default-property-inclusion: non_null

server:
  port: ${PORT:8080}
  servlet:
    context-path: /

# Application config
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry: ${JWT_ACCESS_TOKEN_EXPIRY:3600}
    refresh-token-expiry: ${JWT_REFRESH_TOKEN_EXPIRY:604800}

  oauth:
google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
      token-uri: https://oauth2.googleapis.com/token
      user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
apple:
      client-id: ${APPLE_CLIENT_ID:}
      team-id: ${APPLE_TEAM_ID:}
      key-id: ${APPLE_KEY_ID:}
      private-key: ${APPLE_PRIVATE_KEY:}
      token-uri: https://appleid.apple.com/auth/token


# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

# Logging
logging:
  level:
    root: INFO
    com.mortitech.treasuryflow: DEBUG
    org.springframework.security: INFO

# SpringDoc
springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:false}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:false}
    path: /swagger-ui.html
    operations-sorter: method
