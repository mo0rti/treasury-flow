version: "3"

tasks:
  install:
    desc: Install dependencies
    cmds:
      - npm install

  dev:
    desc: Start the user-facing web app
    cmds:
      - npm run dev

  build:
    desc: Build the user-facing web app
    cmds:
      - npm run build

  lint:
    desc: Lint the user-facing web app
    cmds:
      - npm run lint

  typecheck:
    desc: Type-check the user-facing web app
    cmds:
      - npm run typecheck

  test:
    desc: Run the current verification suite
    cmds:
      - npm run typecheck

  clean:
    desc: Clean Next.js and OpenNext artifacts
    cmds:
      - npm run clean

  build:cloudflare:
    desc: Build the Cloudflare worker bundle
    cmds:
      - npm run build:cloudflare

  preview:
    desc: Preview the Cloudflare worker locally
    cmds:
      - npm run preview

  deploy:
    desc: Deploy to Cloudflare
    cmds:
      - npm run deploy
