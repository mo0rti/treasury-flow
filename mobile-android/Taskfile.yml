version: "3"

vars:
  GRADLEW: '{{if eq OS "windows"}}gradlew.bat{{else}}./gradlew{{end}}'

tasks:
  build:
    desc: Build debug APK
    cmds:
      - "{{.GRADLEW}} assembleDebug"

  devices:
    desc: List connected Android devices and emulators
    cmds:
      - "adb devices"

  build-release:
    desc: Build release APK
    cmds:
      - "{{.GRADLEW}} assembleRelease"

  bundle-release:
    desc: Build release app bundle
    cmds:
      - "{{.GRADLEW}} bundleRelease"

  test:
    desc: Run unit tests
    cmds:
      - "{{.GRADLEW}} testDebugUnitTest"

  test-compile-ui:
    desc: Compile instrumentation and Compose UI test sources
    cmds:
      - "{{.GRADLEW}} compileDebugAndroidTestKotlin"

  test-ui:
    desc: Run instrumentation and Compose UI tests on a connected device/emulator
    cmds:
      - "{{.GRADLEW}} connectedDebugAndroidTest"

  lint:
    desc: Run lint checks
    cmds:
      - "{{.GRADLEW}} lintDebug"

  clean:
    desc: Clean build artifacts
    cmds:
      - "{{.GRADLEW}} clean"

  install:
    desc: Install debug APK on connected device
    cmds:
      - "{{.GRADLEW}} installDebug"
